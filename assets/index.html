<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Blog</title>
  <meta name="description" content="Personal technology notes and development logs.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #222; background: #fafafa; }
    header { background: #1a1a2e; color: #fff; padding: 2rem 1rem; text-align: center; }
    header h1 { font-size: 1.8rem; font-weight: 600; }
    header p { opacity: .8; margin-top: .5rem; }
    main { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    article { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    article h2 { font-size: 1.2rem; margin-bottom: .5rem; }
    .meta { color: #888; font-size: .85rem; margin-bottom: .75rem; }
    footer { text-align: center; padding: 2rem; color: #999; font-size: .85rem; }
  </style>
</head>
<body>
  <header>
    <h1>Tech Blog</h1>
    <p>Development notes &amp; infrastructure logs</p>
  </header>
  <main>
    <article>
      <h2>Server maintenance log</h2>
      <p class="meta">2026-07-04</p>
      <p>Routine VPS maintenance: TLS renewal, nginx tuning, and backup verification.</p>
    </article>
    <article>
      <h2>About</h2>
      <p class="meta">Static site</p>
      <p>Personal blog hosted on a small VPS.</p>
    </article>
  </main>
  <footer>&copy; 2026 Tech Blog</footer>
</body>
</html>
