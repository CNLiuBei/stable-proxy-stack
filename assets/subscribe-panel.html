<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节点订阅</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; line-height: 1.5; min-height: 100vh;
    }
    .wrap { max-width: 520px; margin: 0 auto; padding: 1.25rem; }
    h1 { font-size: 1.35rem; text-align: center; margin-bottom: .25rem; }
    .sub { text-align: center; color: #94a3b8; font-size: .85rem; margin-bottom: 1.25rem; }
    .card {
      background: #1e293b; border-radius: 12px; padding: 1rem 1.1rem;
      margin-bottom: 1rem; border: 1px solid #334155;
    }
    .card h2 { font-size: .95rem; color: #38bdf8; margin-bottom: .75rem; }
    .tag { display: inline-block; font-size: .7rem; padding: .15rem .45rem; border-radius: 4px; margin-right: .35rem; }
    .tag-main { background: #065f46; color: #6ee7b7; }
    .tag-back { background: #713f12; color: #fcd34d; }
    .qr { text-align: center; margin: .75rem 0; }
    .qr canvas, .qr img { border-radius: 8px; background: #fff; padding: 8px; }
    .link-box {
      background: #0f172a; border: 1px solid #475569; border-radius: 8px;
      padding: .55rem .65rem; font-size: .72rem; word-break: break-all;
      color: #cbd5e1; max-height: 4.5rem; overflow-y: auto; margin-bottom: .65rem;
    }
    .btns { display: flex; flex-wrap: wrap; gap: .45rem; }
    button, .btn {
      border: none; border-radius: 8px; padding: .45rem .75rem; font-size: .8rem;
      cursor: pointer; text-decoration: none; display: inline-block; text-align: center;
    }
    .btn-copy { background: #334155; color: #f1f5f9; }
    .btn-copy:hover { background: #475569; }
    .btn-import { background: #2563eb; color: #fff; flex: 1; min-width: calc(50% - .25rem); }
    .btn-import:hover { background: #1d4ed8; }
    .import-section .btns { margin-top: .5rem; }
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #22c55e; color: #fff; padding: .5rem 1rem; border-radius: 8px;
      font-size: .85rem; opacity: 0; transition: opacity .25s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    footer { text-align: center; color: #64748b; font-size: .75rem; padding: 1rem 0 2rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>stable-proxy-stack</h1>
    <p class="sub" id="domain-label">加载中…</p>

    <div class="card">
      <h2>📡 订阅链接（推荐）</h2>
      <p style="font-size:.8rem;color:#94a3b8;margin-bottom:.5rem">一次导入 Reality + hy2 两个节点</p>
      <div class="link-box" id="sub-url"></div>
      <div class="qr" id="qr-sub"></div>
      <div class="btns">
        <button class="btn-copy" onclick="copyText(cfg.subUrl)">复制订阅 URL</button>
      </div>
      <div class="import-section">
        <p style="font-size:.78rem;color:#94a3b8;margin:.75rem 0 .35rem">一键导入客户端</p>
        <div class="btns" id="import-sub-btns"></div>
      </div>
    </div>

    <div class="card">
      <h2><span class="tag tag-main">主力</span> VLESS Reality</h2>
      <div class="link-box" id="reality-link"></div>
      <div class="qr" id="qr-reality"></div>
      <div class="btns">
        <button class="btn-copy" onclick="copyText(cfg.realityLink)">复制链接</button>
      </div>
    </div>

    <div class="card">
      <h2><span class="tag tag-back">备用</span> Hysteria2</h2>
      <div class="link-box" id="hy2-link"></div>
      <div class="qr" id="qr-hy2"></div>
      <div class="btns">
        <button class="btn-copy" onclick="copyText(cfg.hy2Link)">复制链接</button>
      </div>
    </div>

    <div class="card import-section">
      <h2>⚡ Clash Meta 配置</h2>
      <div class="btns">
        <a class="btn btn-import" id="clash-open" href="#">Clash Meta 导入</a>
        <button class="btn-copy" onclick="copyText(cfg.clashUrl)">复制 Clash URL</button>
      </div>
    </div>

    <footer>请妥善保管此页面链接，勿公开分享</footer>
  </div>
  <div class="toast" id="toast">已复制</div>

  <script>
    let cfg = {};

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg || '已复制';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        toast('已复制到剪贴板');
      });
    }

    function encUrl(u) { return encodeURIComponent(u); }

    function b64Utf8(s) {
      return btoa(unescape(encodeURIComponent(s)));
    }

    function makeQr(el, text) {
      QRCode.toCanvas(document.createElement('canvas'), text, { width: 200, margin: 1 }, (err, canvas) => {
        if (!err) { el.innerHTML = ''; el.appendChild(canvas); }
      });
    }

    function importBtn(label, href) {
      const a = document.createElement('a');
      a.className = 'btn btn-import';
      a.textContent = label;
      a.href = href;
      return a;
    }

    function renderImportButtons() {
      const sub = cfg.subUrl;
      const clash = cfg.clashUrl;
      const box = document.getElementById('import-sub-btns');
      const clients = [
        ['Clash Meta', 'clash://install-config?url=' + encUrl(clash)],
        ['v2rayNG', 'v2rayng://install-config?url=' + encUrl(sub)],
        ['Shadowrocket', 'shadowrocket://add/sub://' + b64Utf8(sub)],
        ['Sing-box', 'sing-box://import-remote-profile?url=' + encUrl(sub) + '#stable-proxy'],
        ['Hiddify', 'hiddify://import/?url=' + encUrl(sub)],
        ['NekoBox', 'sn://subscription?url=' + encUrl(sub)],
      ];
      clients.forEach(([name, url]) => box.appendChild(importBtn(name, url)));
      document.getElementById('clash-open').href = 'clash://install-config?url=' + encUrl(clash);
    }

    fetch('config.json')
      .then(r => r.json())
      .then(data => {
        cfg = data;
        document.getElementById('domain-label').textContent = data.domain + ' · ' + (data.created || '');
        document.getElementById('sub-url').textContent = data.subUrl;
        document.getElementById('reality-link').textContent = data.realityLink;
        document.getElementById('hy2-link').textContent = data.hy2Link;
        makeQr(document.getElementById('qr-sub'), data.subUrl);
        makeQr(document.getElementById('qr-reality'), data.realityLink);
        makeQr(document.getElementById('qr-hy2'), data.hy2Link);
        renderImportButtons();
      })
      .catch(() => {
        document.getElementById('domain-label').textContent = '加载配置失败';
      });
  </script>
</body>
</html>
