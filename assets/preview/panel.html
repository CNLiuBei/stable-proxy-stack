<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFIM-Proxy · 节点订阅</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --secondary: #6e6e73;
      --tertiary: #86868b;
      --separator: rgba(60, 60, 67, 0.12);
      --fill: rgba(120, 120, 128, 0.12);
      --fill-hover: rgba(120, 120, 128, 0.18);
      --blue: #0071e3;
      --blue-hover: #0077ed;
      --blue-pressed: #006edb;
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #1c1c1e;
        --text: #f5f5f7;
        --secondary: #a1a1a6;
        --tertiary: #86868b;
        --separator: rgba(84, 84, 88, 0.65);
        --fill: rgba(120, 120, 128, 0.24);
        --fill-hover: rgba(120, 120, 128, 0.32);
        --blue: #0a84ff;
        --blue-hover: #409cff;
        --blue-pressed: #006edb;
        --shadow: 0 2px 24px rgba(0, 0, 0, 0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.47059;
      font-size: 17px;
      letter-spacing: -0.022em;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .viewport {
      min-height: 100dvh;
      max-width: 1080px;
      margin: 0 auto;
      padding: clamp(1rem, 2.5vh, 1.75rem) 1.25rem clamp(0.75rem, 1.5vh, 1.25rem);
      display: flex;
      flex-direction: column;
      gap: clamp(0.75rem, 2vh, 1.25rem);
    }

    .hero {
      text-align: center;
      flex-shrink: 0;
    }

    .hero h1 {
      font-size: clamp(1.75rem, 4.5vw, 2.125rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.05;
      margin-bottom: 0.35rem;
    }

    .hero-meta {
      font-size: 0.9375rem;
      color: var(--secondary);
      font-weight: 400;
    }

    .hero-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .version {
      display: inline-block;
      margin-top: 0.45rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--tertiary);
      background: var(--fill);
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }

    .cards-row {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(0.65rem, 1.5vw, 1rem);
      min-height: 0;
      align-items: stretch;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .card-inner {
      padding: clamp(0.85rem, 1.8vh, 1.1rem);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      min-height: 0;
    }

    .card-head {
      flex-shrink: 0;
    }

    .card-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 0.15rem;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
    }

    .card h2 {
      font-size: 1.0625rem;
      font-weight: 700;
      letter-spacing: -0.028em;
      line-height: 1.15;
    }

    .pill {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--secondary);
      background: var(--fill);
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .pill.accent {
      color: var(--blue);
      background: rgba(0, 113, 227, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      .pill.accent { background: rgba(10, 132, 255, 0.18); }
    }

    .hint {
      font-size: 0.8125rem;
      color: var(--secondary);
      line-height: 1.35;
    }

    .link-group {
      background: var(--fill);
      border-radius: var(--radius-lg);
      padding: 2px;
      flex-shrink: 0;
    }

    .link-box {
      background: var(--surface);
      border-radius: calc(var(--radius-lg) - 2px);
      padding: 0.55rem 0.65rem;
      font-family: var(--mono);
      font-size: 0.625rem;
      word-break: break-all;
      color: var(--text);
      max-height: 3.2rem;
      overflow-y: auto;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .qr-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .qr {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 0.45rem;
      line-height: 0;
    }

    @media (prefers-color-scheme: dark) {
      .qr { background: #fff; }
    }

    .qr img {
      width: 96px;
      height: 96px;
      display: block;
      border-radius: 4px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      flex-shrink: 0;
    }

    .btns {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.35rem;
    }

    button, .btn {
      border: none;
      border-radius: var(--radius-md);
      padding: 0.5rem 0.65rem;
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s ease, transform 0.1s ease;
      white-space: nowrap;
    }

    button:focus-visible, .btn:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    button:active, .btn:active { transform: scale(0.98); }

    .btn-primary {
      width: 100%;
      background: var(--blue);
      color: #fff;
      padding: 0.55rem 0.75rem;
      font-size: 0.875rem;
    }

    .btn-primary:hover { background: var(--blue-hover); }
    .btn-primary:active { background: var(--blue-pressed); }

    .btn-secondary {
      background: var(--fill);
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-secondary:hover { background: var(--fill-hover); }

    .section-title {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-top: 0.15rem;
    }

    footer {
      text-align: center;
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--tertiary);
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(29, 29, 31, 0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      color: #fff;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body { overflow-y: auto; }
      .viewport { min-height: auto; }
      .cards-row {
        grid-template-columns: 1fr;
        flex: none;
      }
      .card { min-height: auto; }
      .qr img { width: 120px; height: 120px; }
      .link-box { max-height: 4rem; font-size: 0.6875rem; }
    }

    @media (max-width: 480px) {
      .btns { grid-template-columns: 1fr; }
      body { font-size: 16px; }
    }

    @media (min-width: 901px) and (min-height: 700px) {
      .viewport { height: 100dvh; overflow: hidden; }
      .card-inner { overflow: hidden; }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <header class="hero">
      <h1>IFIM-Proxy</h1>
      <p class="hero-meta" id="domain-label">加载中…</p>
      <span class="version" id="version-label"></span>
    </header>

    <main class="cards-row">
      <section class="card">
        <div class="card-inner">
          <div class="card-head">
            <p class="card-label">订阅</p>
            <div class="card-title-row">
              <h2>全部节点</h2>
            </div>
            <p class="hint">一次导入 Reality 与 Hysteria2</p>
          </div>
          <div class="link-group">
            <div class="link-box" id="sub-url"></div>
          </div>
          <div class="qr-row">
            <div class="qr"><img src="qr-sub.svg" alt="订阅二维码" width="96" height="96"></div>
          </div>
          <div class="actions">
            <button class="btn-primary" type="button" id="copy-sub">拷贝订阅链接</button>
            <p class="section-title">导入到客户端</p>
            <div class="btns" id="import-sub-btns"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-inner">
          <div class="card-head">
            <p class="card-label">主力节点</p>
            <div class="card-title-row">
              <h2>Reality</h2>
              <span class="pill accent">推荐</span>
            </div>
            <p class="hint">VLESS · Reality · Vision · TCP 443</p>
          </div>
          <div class="link-group">
            <div class="link-box" id="reality-link"></div>
          </div>
          <div class="qr-row">
            <div class="qr"><img src="qr-reality.svg" alt="Reality 二维码" width="96" height="96"></div>
          </div>
          <div class="actions">
            <button class="btn-primary" type="button" id="copy-reality">拷贝链接</button>
            <p class="section-title">单节点导入</p>
            <div class="btns" id="import-reality-btns"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-inner">
          <div class="card-head">
            <p class="card-label">备用节点</p>
            <div class="card-title-row">
              <h2>Hysteria2</h2>
              <span class="pill">备用</span>
            </div>
            <p class="hint">Hysteria2 · obfs · UDP 443</p>
          </div>
          <div class="link-group">
            <div class="link-box" id="hy2-link"></div>
          </div>
          <div class="qr-row">
            <div class="qr"><img src="qr-hy2.svg" alt="Hysteria2 二维码" width="96" height="96"></div>
          </div>
          <div class="actions">
            <button class="btn-primary" type="button" id="copy-hy2">拷贝链接</button>
            <p class="section-title">单节点导入</p>
            <div class="btns" id="import-hy2-btns"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>请妥善保管此页面链接，勿公开分享。</footer>
  </div>
  <div class="toast" id="toast">已拷贝</div>

  <script>
    const INLINE_CFG = {"domain":"demo.example.com","subUrl":"https://demo.example.com:8443/s/demo-token-abc123/sub","clashUrl":"https://demo.example.com:8443/s/demo-token-abc123/clash","realityLink":"vless://00000000-0000-0000-0000-000000000001@demo.example.com:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni=www.microsoft.com&fp=chrome&pbk=DemoPublicKey&sid=abcd1234&type=tcp#IFIM-Reality","hy2Link":"hysteria2://demo-password@demo.example.com:443?obfs=salamander&obfs-password=demo-obfs&sni=demo.example.com&insecure=0#IFIM-Hysteria2","created":"2026-07-04 07:29 UTC","version":"0.0.18"};
    const BUILT_VERSION = '0.0.18';
    let cfg = {};

    function panelVersion(data) {
      const embedded = BUILT_VERSION.includes('SCRIPT_VERSION') ? '' : BUILT_VERSION;
      const v = data.version || embedded;
      return v ? v : '';
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg || '已拷贝';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function copyText(text) {
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => toast('已拷贝到剪贴板')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('已拷贝到剪贴板');
      });
    }

    function encUrl(u) { return encodeURIComponent(u); }

    function b64Utf8(s) {
      return btoa(unescape(encodeURIComponent(s)));
    }

    function importBtn(label, href) {
      const a = document.createElement('a');
      a.className = 'btn btn-secondary';
      a.textContent = label;
      a.href = href;
      a.rel = 'noopener';
      return a;
    }

    function fillBtns(boxId, items) {
      const box = document.getElementById(boxId);
      box.innerHTML = '';
      items.forEach(([name, url]) => box.appendChild(importBtn(name, url)));
    }

    function renderSubImports() {
      const sub = cfg.subUrl;
      const clash = cfg.clashUrl;
      fillBtns('import-sub-btns', [
        ['Clash Meta', 'clash-meta://install-config?url=' + encUrl(clash)],
        ['Clash Verge', 'clash://install-config?url=' + encUrl(clash)],
        ['v2rayNG', 'v2rayng://install-config?url=' + encUrl(sub)],
        ['Shadowrocket', 'shadowrocket://add/sub://' + b64Utf8(sub)],
        ['Sing-box', 'sing-box://import-remote-profile?url=' + encUrl(sub) + '#stable-proxy'],
        ['Hiddify', 'hiddify://import/?url=' + encUrl(sub)],
        ['NekoBox', 'sn://subscription?url=' + encUrl(sub)],
      ]);
    }

    function renderNodeImports(boxId, link) {
      fillBtns(boxId, [
        ['Shadowrocket', 'shadowrocket://add/' + encUrl(link)],
        ['v2rayNG', 'v2rayng://install-config?url=' + encUrl(link)],
        ['Sing-box', 'sing-box://import?url=' + encUrl(link)],
        ['Hiddify', 'hiddify://import/?url=' + encUrl(link)],
      ]);
    }

    function renderPanel(data) {
      cfg = data;
      const ver = panelVersion(data);
      document.getElementById('version-label').textContent = ver ? '版本 ' + ver : '';
      document.getElementById('domain-label').innerHTML =
        '<strong>' + data.domain + '</strong> · ' + (data.created || '');
      document.getElementById('sub-url').textContent = data.subUrl;
      document.getElementById('reality-link').textContent = data.realityLink;
      document.getElementById('hy2-link').textContent = data.hy2Link;

      document.getElementById('copy-sub').onclick = () => copyText(data.subUrl);
      document.getElementById('copy-reality').onclick = () => copyText(data.realityLink);
      document.getElementById('copy-hy2').onclick = () => copyText(data.hy2Link);

      document.getElementById('sub-url').onclick = () => copyText(data.subUrl);
      document.getElementById('reality-link').onclick = () => copyText(data.realityLink);
      document.getElementById('hy2-link').onclick = () => copyText(data.hy2Link);
      ['sub-url', 'reality-link', 'hy2-link'].forEach(id => {
        document.getElementById(id).title = '点击拷贝';
        document.getElementById(id).style.cursor = 'pointer';
      });

      renderSubImports();
      renderNodeImports('import-reality-btns', data.realityLink);
      renderNodeImports('import-hy2-btns', data.hy2Link);
    }

    function loadPanel() {
      if (INLINE_CFG && INLINE_CFG.subUrl) {
        renderPanel(INLINE_CFG);
        return;
      }
      fetch('config.json')
        .then(r => r.json())
        .then(renderPanel)
        .catch(() => {
          document.getElementById('domain-label').textContent = '加载配置失败，请重新运行安装脚本';
        });
    }

    loadPanel();
  </script>
</body>
</html>
